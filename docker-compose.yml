# docker-compose.yml — BDC-STAC Local Stack
# LambdaGeo / UFMA — 2026

services:
  bdc-postgres:
    image: postgis/postgis:15-3.3
    container_name: bdc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bdc_catalog}
    volumes:
      - bdc-postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - bdc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bdc_catalog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bdc-stac:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bdc-stac
    depends_on:
      bdc-postgres:
        condition: service_healthy
    environment:
      SQLALCHEMY_DATABASE_URI: ${DATABASE_URL:-postgresql://postgres:postgres@bdc-postgres:5432/bdc_catalog}
      BDC_STAC_BASE_URL: ${BDC_STAC_BASE_URL:-http://localhost:8080}
      BDC_STAC_FILE_ROOT: ${BDC_STAC_FILE_ROOT:-http://localhost:8081}
      BDC_STAC_TITLE: ${BDC_STAC_TITLE:-LambdaGeo BDC Catalog}
      BDC_STAC_ID: ${BDC_STAC_ID:-lambdageo-bdc}
      BDC_STAC_MAX_LIMIT: ${BDC_STAC_MAX_LIMIT:-1000}
    ports:
      - "8080:5000"
    volumes:
      - .:/opt/bdc-stac/1.0.2
    networks:
      - bdc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  static-assets:
    image: nginx:alpine
    container_name: bdc-assets
    volumes:
      - ./data:/usr/share/nginx/html/assets:ro
    ports:
      - "8081:80"
    networks:
      - bdc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/assets/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bdc-net:
    driver: bridge
    name: bdc-net

volumes:
  bdc-postgres-data:
    driver: local